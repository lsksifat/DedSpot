name: Daily WiFi ingest

# Runs the OpenStreetMap ingest every day so new spots appear automatically.
# GitHub Actions has no short function timeout (unlike serverless), so this is
# the reliable place to run the (potentially long) ingest.
on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm run db:ingest
        env:
          # Add this in GitHub → repo Settings → Secrets and variables → Actions.
          # Use the Supabase Session pooler string (IPv4), password included.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
